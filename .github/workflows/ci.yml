name: CI

on:
  pull_request:
    branches: [master]

jobs:
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore TechStore.API/TechStore.API.csproj

      - name: Build
        run: dotnet build TechStore.API/TechStore.API.csproj --no-restore --configuration Release

      - name: Publish
        run: dotnet publish TechStore.API/TechStore.API.csproj --no-build --configuration Release --output ./api-publish

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: techstore-frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: techstore-frontend

      - name: Build
        run: npm run build
        working-directory: techstore-frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
